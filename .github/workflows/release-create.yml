name: Release (npm create)

# Publishes @typemvc/create to npm when a create-v* tag is pushed, e.g.
# create-v0.1.0. Reuses the NPM_TOKEN secret (an npm automation token with
# publish rights to the @typemvc scope). Provenance requires id-token below.

on:
  push:
    tags:
      - 'create-v*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="create-v$(node -p "require('./packages/create/package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Lint, typecheck, test, build
        run: pnpm --filter @typemvc/create run ci

      - name: Publish to npm
        run: pnpm --filter @typemvc/create publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
