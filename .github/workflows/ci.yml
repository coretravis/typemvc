name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, test, build
        run: pnpm run ci

      - name: Check @typemvc/create package
        run: pnpm --filter @typemvc/create run ci

      - name: Build VS Code extension
        working-directory: extensions/tmvc-syntax
        run: |
          npm ci
          node build.mjs
          npm run typecheck
